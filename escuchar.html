<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiero de Ti — DEJAVÚ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #07070C;
      --dark:    #0D0D18;
      --purple:  #7B2FBE;
      --purple2: #9D4EDD;
      --purple3: #C77DFF;
      --white:   #F0EEF8;
      --gray:    #8888A0;
      --gold:    #D4AA28;
      --gold2:   #FFD94A;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* ─── CURSOR ─── */
    #cursor {
      position: fixed; z-index: 9999; pointer-events: none;
      width: 12px; height: 12px;
      background: var(--purple3);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: transform .1s, width .3s, height .3s;
      mix-blend-mode: screen;
    }
    #cursor-ring {
      position: fixed; z-index: 9998; pointer-events: none;
      width: 36px; height: 36px;
      border: 1.5px solid var(--purple2);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: transform .25s ease, width .3s, height .3s;
    }

    /* ─── GRAIN ─── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9990; pointer-events: none;
      opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* ─── CANVAS STARS ─── */
    #starfield {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ─── ORBS ─── */
    .orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      filter: blur(80px);
    }
    .orb1 { width: 500px; height: 500px; background: rgba(123,47,190,.18); top: -150px; left: -100px; animation: floatOrb 12s ease-in-out infinite; }
    .orb2 { width: 350px; height: 350px; background: rgba(157,78,221,.12); bottom: -80px; right: -80px; animation: floatOrb 9s ease-in-out infinite reverse; }
    @keyframes floatOrb { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }

    /* ─── LAYOUT ─── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 24px;
      gap: 0;
    }

    /* ─── LOGO ─── */
    .logo-wrap {
      margin-bottom: 40px;
    }
    .logo-wrap img {
      height: 44px; width: auto; opacity: .9;
    }

    /* ─── CARD ─── */
    .card {
      width: 100%; max-width: 420px;
      border-radius: 28px; overflow: hidden;
      border: 1.5px solid rgba(212,170,40,.65);
      background: linear-gradient(160deg, #0E0B02 0%, #100C00 50%, #08060A 100%);
      box-shadow: 0 0 60px rgba(212,170,40,.18), 0 40px 100px rgba(0,0,0,.6);
      animation: cardPulse 3.5s ease-in-out infinite;
    }
    @keyframes cardPulse {
      0%,100% { box-shadow: 0 0 50px rgba(212,170,40,.15), 0 40px 100px rgba(0,0,0,.6); }
      50%      { box-shadow: 0 0 90px rgba(212,170,40,.28), 0 40px 100px rgba(0,0,0,.6); }
    }

    .cover-wrap {
      position: relative; width: 100%; aspect-ratio: 1; overflow: hidden;
    }
    .cover-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      filter: saturate(1.15) brightness(1.02);
      display: block;
      transform: scale(1.03);
    }
    .cover-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(14,11,2,.85) 0%, rgba(14,11,2,.1) 50%, transparent 100%);
    }
    .cover-badge {
      position: absolute; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 5px;
      background: linear-gradient(90deg, rgba(212,170,40,.35), rgba(255,210,60,.2));
      border: 1px solid rgba(212,170,40,.85);
      color: var(--gold2); font-size: 10px; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 100px;
      backdrop-filter: blur(8px);
      text-shadow: 0 0 10px rgba(255,210,50,.5);
      box-shadow: 0 0 14px rgba(212,170,40,.25);
    }
    .cover-badge::before { content: '✦'; font-size: 8px; }

    /* ─── INFO ─── */
    .info {
      padding: 24px 28px 28px;
    }
    .song-artist {
      font-size: 12px; font-weight: 500; letter-spacing: .1em;
      text-transform: uppercase; color: var(--gray);
      margin-bottom: 6px;
    }
    .song-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px; letter-spacing: .06em;
      background: linear-gradient(90deg, #FFD966 0%, #E8B820 40%, #FFE680 70%, #C8960A 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1; margin-bottom: 6px;
    }
    .song-desc {
      font-size: 14px; font-weight: 300; color: rgba(240,230,180,.6);
      margin-bottom: 28px; line-height: 1.5;
    }

    /* ─── PLATFORM BUTTONS ─── */
    .platforms {
      display: flex; flex-direction: column; gap: 12px;
    }
    .plat-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 20px; border-radius: 14px;
      text-decoration: none; color: var(--white);
      font-size: 15px; font-weight: 500;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      transition: background .25s, border-color .25s, transform .2s, box-shadow .25s;
      cursor: none;
    }
    .plat-btn:hover {
      transform: translateX(6px);
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.18);
    }
    .plat-btn .plat-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .plat-btn .plat-icon svg { width: 20px; height: 20px; }
    .plat-btn .plat-text { flex: 1; }
    .plat-btn .plat-name { display: block; font-weight: 600; font-size: 15px; }
    .plat-btn .plat-sub  { display: block; font-size: 12px; color: var(--gray); font-weight: 400; }
    .plat-btn .plat-arrow { opacity: .4; font-size: 18px; transition: opacity .2s; }
    .plat-btn:hover .plat-arrow { opacity: .9; }

    /* Spotify */
    .plat-spotify .plat-icon { background: #1DB954; }
    .plat-spotify:hover { border-color: rgba(29,185,84,.5); box-shadow: 0 4px 20px rgba(29,185,84,.15); }

    /* YouTube */
    .plat-youtube .plat-icon { background: #FF0000; }
    .plat-youtube:hover { border-color: rgba(255,0,0,.4); box-shadow: 0 4px 20px rgba(255,0,0,.12); }

    /* Apple Music */
    .plat-apple .plat-icon { background: linear-gradient(135deg, #FC3C44, #FA586A); }
    .plat-apple:hover { border-color: rgba(252,60,68,.4); box-shadow: 0 4px 20px rgba(252,60,68,.12); }

    /* Amazon Music */
    .plat-amazon .plat-icon { background: #00A8E1; }
    .plat-amazon:hover { border-color: rgba(0,168,225,.4); box-shadow: 0 4px 20px rgba(0,168,225,.12); }

    /* ─── BACK LINK ─── */
    .back-link {
      margin-top: 32px;
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--gray); font-size: 13px; font-weight: 400;
      text-decoration: none; letter-spacing: .04em;
      transition: color .2s;
      cursor: none;
    }
    .back-link:hover { color: var(--white); }
    .back-link svg { width: 14px; height: 14px; }
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<canvas id="starfield"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

        <a class="plat-btn plat-apple" href="https://music.apple.com/us/artist/dejavu/1705170948" target="_blank">
          <div class="plat-icon">

<script>
  /* ─── CURSOR ─── */
  const cur = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let rx = 0, ry = 0;
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px';
    rx += (e.clientX - rx) * .12; ry += (e.clientY - ry) * .12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  });
  (function animRing() { requestAnimationFrame(animRing); ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; })();

  /* ─── STARS ─── */
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    stars = Array.from({length: 140}, () => ({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + .2,
      o: Math.random(), d: Math.random() * 3000 + 1500, t: Math.random() * 3000
    }));
  }
  window.addEventListener('resize', resize); resize();
  function drawStars(ts) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const opacity = .1 + .7 * (.5 + .5 * Math.sin((ts - s.t) / s.d * Math.PI * 2));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,190,255,${opacity * .8})`; ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  /* ─── CURSOR HOVER ─── */
  document.querySelectorAll('a').forEach(el => {
    el.addEventListener('mouseenter', () => { cur.style.transform = 'translate(-50%,-50%) scale(2.5)'; ring.style.borderColor = 'var(--gold)'; });
    el.addEventListener('mouseleave', () => { cur.style.transform = 'translate(-50%,-50%) scale(1)'; ring.style.borderColor = 'var(--purple2)'; });
  });
</script>
